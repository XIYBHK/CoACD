name: Build UE DLL

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build-ue-dll:
    permissions:
      contents: read
    runs-on: windows-2022
    timeout-minutes: 60
    concurrency:
      group: build-ue-dll-${{ github.ref }}
      cancel-in-progress: true
    env:
      CMAKE_BUILD_PARALLEL_LEVEL: 4
      # 启用 manifest + 二进制缓存
      VCPKG_FEATURE_FLAGS: manifests,binarycaching
      # 可选：固定 vcpkg 版本（留空则使用最新）。可填具体 commit，如 2024-07 baseline 对应的提交。
      VCPKG_COMMIT: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set vcpkg local binary cache env
        shell: powershell
        run: |
          $cache = Join-Path $env:RUNNER_TEMP 'vcpkg\\archives'
          echo "VCPKG_DEFAULT_BINARY_CACHE=$cache" >> $env:GITHUB_ENV
          echo "VCPKG_BINARY_SOURCES=clear;files,$cache,readwrite" >> $env:GITHUB_ENV

      - name: Setup MSVC (x64)
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Setup vcpkg and install minimal deps (openvdb[core])
        shell: powershell
        run: |
          $env:VCPKG_ROOT = "$env:RUNNER_TEMP\vcpkg"
          git clone --depth 1 https://github.com/microsoft/vcpkg $env:VCPKG_ROOT
          & "$env:VCPKG_ROOT\bootstrap-vcpkg.bat"
          if ($env:VCPKG_COMMIT -ne "") { git -C $env:VCPKG_ROOT fetch --depth 1 origin $env:VCPKG_COMMIT; git -C $env:VCPKG_ROOT checkout $env:VCPKG_COMMIT }
          $commit = git -C $env:VCPKG_ROOT rev-parse HEAD
          "VCPKG_COMMIT=$commit" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding ASCII
          New-Item -ItemType Directory -Force -Path "$env:VCPKG_ROOT\archives","$env:VCPKG_ROOT\installed" | Out-Null

      - name: Cache vcpkg binary archives
        uses: actions/cache@v4
        with:
          path: ${{ env.VCPKG_ROOT }}\archives
          key: vcpkg-archives-${{ runner.os }}-x64-windows-static-md
          restore-keys: |
            vcpkg-archives-${{ runner.os }}-

      - name: Cache vcpkg installed tree
        uses: actions/cache@v4
        with:
          path: ${{ env.VCPKG_ROOT }}\installed
          key: vcpkg-installed-${{ runner.os }}-x64-windows-static-md
          restore-keys: |
            vcpkg-installed-${{ runner.os }}-

      - name: Generate vcpkg manifest (minimal deps)
        shell: powershell
        run: |
          @"
          {
            "name": "coacd-ue",
            "version-string": "0.0.0",
            "builtin-baseline": "${{ env.VCPKG_COMMIT }}",
            "dependencies": [
              { "name": "openvdb", "default-features": false },
              "tbb",
              "zlib",
              "imath",
              "spdlog"
            ]
          }
          "@ | Out-File -FilePath vcpkg.json -Encoding UTF8

      - name: Install vcpkg packages (manifest)
        shell: powershell
        run: |
          $max=3
          for ($i=1; $i -le $max; $i++) {
            & "$env:VCPKG_ROOT\vcpkg.exe" install --triplet x64-windows-static-md
            if ($LASTEXITCODE -eq 0) { break }
            Start-Sleep -Seconds (10 * $i)
          }
          if ($LASTEXITCODE -ne 0) { throw "vcpkg install failed after $max attempts" }

      - name: Configure CMake (Release, /MD, OpenMP ON, LTO, minimal deps)
        shell: powershell
        run: >
          cmake -S . -B build-ue-full -G "Visual Studio 17 2022" -A x64
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreadedDLL
          -DBUILD_SHARED_LIBS=OFF
          -DWITH_3RD_PARTY_LIBS=ON
          -DOPENVDB_CORE_SHARED=OFF
          -DOPENVDB_USE_BLOSC=OFF
          -DOPENVDB_BUILD_TOOLS=OFF
          -DOPENVDB_BUILD_UNITTESTS=OFF
          -DOPENVDB_BUILD_PYTHON_BINDINGS=OFF
          -DOPENVDB_BUILD_DOCS=OFF
          -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT\scripts\buildsystems\vcpkg.cmake"
          -DVCPKG_TARGET_TRIPLET=x64-windows-static-md
          -DCMAKE_INTERPROCEDURAL_OPTIMIZATION=ON
          -DCMAKE_CXX_FLAGS_RELEASE="/O2 /GL /Gy"
          -DCMAKE_SHARED_LINKER_FLAGS_RELEASE="/LTCG /OPT:REF /OPT:ICF"

      - name: Build _coacd (lib_coacd.dll)
        shell: powershell
        run: cmake --build build-ue-full --target _coacd --config Release --parallel

      - name: Upload CMake logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cmake-logs-${{ github.run_number }}
          path: |
            build-ue-full/CMakeFiles/CMakeOutput.log
            build-ue-full/CMakeFiles/CMakeError.log
          if-no-files-found: ignore

      - name: Upload DLL artifact
        uses: actions/upload-artifact@v4
        with:
          name: lib_coacd-windows-amd64-Release-${{ github.run_number }}
          path: build-ue-full/Release/lib_coacd.dll
          if-no-files-found: error
          retention-days: 14

